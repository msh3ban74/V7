name: Build APK from ZIP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Unzip
        run: |
          unzip -q "*.zip" -d project
          # الانتقال للمجلد
          cd "$(find project -name "gradlew" -exec dirname {} \; | head -n 1)"
          
          # مسح أي wrapper قديم تالف
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # استخدام sh لتشغيل الـ gradlew مباشرة كمعامل
          sh gradlew wrapper
          sh gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
