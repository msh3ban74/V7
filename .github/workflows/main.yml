name: Build APK from ZIP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Unzip
        run: |
          unzip -q "*.zip" -d project
          # الانتقال لمجلد المشروع
          cd "$(find project -name "gradlew" -exec dirname {} \; | head -n 1)"
          
          # مسح ملفات الـ Wrapper التالفة عشان الـ GitHub يجددها
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # إنشاء Wrapper جديد ونظيف
          ./gradlew wrapper --gradle-version 8.5
          
          # تنفيذ البناء
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
