name: Build V7 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Unzip project
        run: |
          LATEST_ZIP=$(ls -t *.zip 2>/dev/null | head -n 1)
          echo "Found ZIP: $LATEST_ZIP"
          unzip -q "$LATEST_ZIP" -d extracted
          if [ -f "extracted/V7/gradlew" ]; then
            cp -r extracted/V7/. .
          elif [ -f "extracted/gradlew" ]; then
            cp -r extracted/. .
          else
            GRADLE_DIR=$(find extracted -name "gradlew" | head -1 | xargs dirname)
            cp -r "$GRADLE_DIR"/. .
          fi
          echo "✅ Extracted"
          ls -la

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle Wrapper JAR
        run: gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V7-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
