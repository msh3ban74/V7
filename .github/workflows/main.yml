name: Build APK from ZIP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unzip and Build
        run: |
          LATEST_ZIP=$(ls -t *.zip | head -n 1)
          unzip -q "$LATEST_ZIP" -d project
          
          GRADLE_PATH=$(find project -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          
          # إنشاء ملفات البيئة في المجلد الرئيسي وفي مجلد app لتفادي اعتراض المترجم
          touch .env
          touch .env.example
          if [ -d "app" ]; then
            touch app/.env
            touch app/.env.example
          fi
          
          # توليد ملف الـ keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          if [ -d "app" ]; then
            cp debug.keystore app/
          fi
          
          # تشغيل البناء
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
