name: Build APK from ZIP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unzip and Build
        run: |
          LATEST_ZIP=$(ls -t *.zip | head -n 1)
          unzip -q "$LATEST_ZIP" -d project
          
          # تحديد المسار الحقيقي الذي يحتوي على settings.gradle أو build.gradle
          GRADLE_PATH=$(find project -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          
          echo "Moving to project directory: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          
          # التأكد من الملفات الموجودة للمعاينة في الـ Logs
          ls -la
          
          # البناء المباشر
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
