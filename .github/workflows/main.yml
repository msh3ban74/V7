name: Build APK from ZIP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Unzip
        run: |
          LATEST_ZIP=$(ls -t *.zip | head -n 1)
          unzip -q "$LATEST_ZIP" -d project
          
          # إيجاد المجلد الذي يحتوي على gradlew
          GRADLEW_DIR=$(find project -name "gradlew" -exec dirname {} \; | head -n 1)
          cd "$GRADLEW_DIR"
          
          # مسح أي wrapper تالف
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # استخدام bash لتنفيذ الـ wrapper ثم البناء
          bash ./gradlew wrapper --gradle-version 8.5
          bash ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
