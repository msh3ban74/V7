      - name: Build and Unzip
        run: |
          # البحث عن أي ملف ينتهي بـ zip وفك ضغطه
          find . -name "*.zip" -exec unzip -q {} -d project \;
          # التأكد من الدخول للمجلد
          cd project
          # إعطاء صلاحية التنفيذ للجرادل
          chmod +x gradlew
          # بناء التطبيق
          ./gradlew assembleDebug
